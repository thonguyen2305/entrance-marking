<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marking Entrance Kids - DOL English Professional</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- Google APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <style>
    :root { --dol-red: #E02020; --dol-black: #2D3136; --blue: #3182CE; --green: #38A169; --yellow: #D69E2E; --bg: #F8FAFC; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Lexend', sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }
    #app { display: flex; height: 100vh; width: 100vw; }
    
    /* SIDEBAR */
    #sidebar { width: 400px; min-width: 400px; background: white; border-right: 1px solid #E2E8F0; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; height: 100vh; z-index: 100; }
    .dol-header-title { font-size: 20px; font-weight: 800; text-align: center; color: var(--dol-black); letter-spacing: -0.5px; margin-bottom: 4px; }
    .red-text { color: var(--dol-red); }
    .dol-card-main { background: #F1F4F8; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .dol-input-group label { display: block; font-size: 10px; font-weight: 700; color: #718096; margin-bottom: 2px; text-transform: uppercase; }
    .dol-input-group input, .dol-input-group select { width: 100%; border: 1.5px solid #CBD5E0; border-radius: 10px; padding: 7px 12px; font-size: 13px; outline: none; font-family: 'Lexend', sans-serif; transition: 0.2s; }
    .btn-sheets-pro { height: 38px; display: flex; align-items: center; gap: 8px; background: white; border: 1.2px solid #DADCE0; border-radius: 20px; padding: 0 14px; font-size: 11px; font-weight: 600; color: #444; cursor: pointer; }
    .skill-card { background: white; border: 1px solid #EDF2F7; border-radius: 16px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .rw-blue { border-left: 5px solid var(--blue); } .li-green { border-left: 5px solid var(--green); } .sp-yellow { border-left: 5px solid var(--yellow); }
    .skill-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .skill-name { font-weight: 700; font-size: 11px; color: #4A5568; white-space: nowrap; display: flex; align-items: center; line-height: 1; }
    .btn-dol-action { padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; border: none; color: white; }
    .danger-light { background: #FFF5F5; border: 1px solid #FEB2B2; color: #C53030; }
    .blue-main { background: var(--blue); } .green-main { background: var(--green); }
    .page-grid-modern { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
    .page-box { background: white; border: 1.5px solid #eee; padding: 4px 8px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .page-box.active { border-color: var(--dol-red); background: #FFF1F1; }
    .page-box span { font-size: 10px; font-weight: 400; color: #718096; }
    .page-box input { width: 42px; height: 28px; border: 1px solid #E2E8F0; border-radius: 6px; text-align: center; font-weight: 800; color: var(--dol-red); font-size: 14px; }

    /* SUMMARY */
    .summary-container { padding: 15px; border: 2.5px solid var(--dol-red); border-radius: 24px; background: white; margin-top: 5px; }
    .sum-box { margin-bottom: 12px; }
    .sum-label { font-size: 12.5px; font-weight: 800; margin-bottom: 3px; }
    .color-rw { color: var(--blue); } .color-li { color: var(--green); } .color-sp { color: var(--yellow); }
    .score-achieved { color: var(--dol-red); font-weight: 800; }
    textarea { width: 100%; min-height: 40px; border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 8px; font-size: 12.5px; font-family: 'Lexend', sans-serif; resize: none; background: #F8FAFC; outline: none; }
    .dol-final-hero { display: flex; align-items: center; gap: 15px; margin: 12px 0; border-top: 1px dashed #eee; padding-top: 10px; }
    .shield-circle-hero { width: 85px; height: 85px; border-radius: 50%; background: var(--dol-red); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; box-shadow: 0 8px 20px rgba(224, 32, 32, 0.3); flex-shrink: 0; }
    .shield-circle-hero small { font-size: 11px; margin-top: -3px; font-weight: 400; text-transform: lowercase; }
    .select-hero { width: 100%; height: 48px; border: 2px solid var(--dol-red); border-radius: 12px; font-size: 18px; font-weight: 800; color: var(--dol-red); outline: none; padding-left: 5px; cursor: pointer; font-family: 'Lexend', sans-serif;}
    .btn-dol-primary-red { width: 100%; height: 50px; background: var(--dol-red); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }

    /* LAYOUT CONTENT */
    #content-main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #eaedf2; }

    /* ANSWER KEY */
    #answer-key-section {
        width: 100%; height: 280px; min-height: 60px; max-height: 80vh;
        background: white; border-bottom: none;
        overflow-y: auto; z-index: 50;
        display: flex; flex-direction: column; align-items: center; padding: 10px 10px 8px 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        flex-shrink: 0;
    }
    #answer-key-section h4 { font-size: 12px; color: var(--dol-red); text-transform: uppercase; margin: 0 0 8px 0; font-weight: 800; }
    #answer-key-img { max-width: 950px; width: 100%; border-radius: 8px; border: 1px solid #f0f0f0; }
    #resize-handle {
        height: 14px; width: 100%; cursor: ns-resize;
        background: #F1F4F8;
        border-top: 1px solid #E2E8F0;
        border-bottom: 2px solid #DADCE0;
        display: flex; justify-content: center; align-items: center;
        transition: background 0.2s;
        flex-shrink: 0;
        z-index: 51;
    }
    #resize-handle:hover { background: #CBD5E0; }
    #resize-handle::after { content: "● ● ●"; color: #718096; font-size: 8px; letter-spacing: 2px; }

    #viewer-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 0; scroll-behavior: smooth; }
    .canvas-item-wrapper { margin-bottom: 30px; background: white; padding: 8px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); position: relative; }
    .context-menu-pro { position: absolute; background: white; border-radius: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 1000; padding: 5px; border: 1px solid #eee; }
    .context-menu-pro button { border: none; background: transparent; padding: 10px 20px; cursor: pointer; font-weight: 600; font-size: 13px; text-align: left; font-family: 'Lexend', sans-serif;}

    /* ===== GOOGLE DRIVE PANEL ===== */
    .drive-panel { background: #F0FFF4; border: 1.5px solid #9AE6B4; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .drive-panel-title { font-size: 10px; font-weight: 800; color: #276749; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .drive-status-bar { display: flex; align-items: center; gap: 8px; }
    .drive-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--green); color: white; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .drive-user-name { font-size: 11px; font-weight: 700; color: #276749; flex: 1; }
    .btn-google-login { display: flex; align-items: center; gap: 8px; background: white; border: 1.5px solid #DADCE0; border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 700; color: #444; cursor: pointer; width: 100%; justify-content: center; transition: 0.2s; }
    .btn-google-login:hover { background: #f5f5f5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn-google-logout { font-size: 10px; font-weight: 600; color: #C53030; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
    .btn-google-logout:hover { background: #FFF5F5; }
    .drive-link-row { display: flex; gap: 6px; align-items: center; }
    .drive-link-input { flex: 1; border: 1.5px solid #CBD5E0; border-radius: 10px; padding: 6px 10px; font-size: 11px; font-family: 'Lexend', sans-serif; outline: none; }
    .drive-link-input:focus { border-color: var(--green); }
    .btn-load-drive { padding: 6px 12px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-load-drive:disabled { background: #A0AEC0; cursor: not-allowed; }
    .drive-skill-row { display: flex; gap: 6px; align-items: center; }
    .drive-skill-label { font-size: 10px; font-weight: 700; color: #718096; width: 30px; }
    .drive-progress { font-size: 10px; color: #718096; font-weight: 600; text-align: center; min-height: 14px; }

    /* LOADING OVERLAY */
    #drive-loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    #drive-loading.show { display: flex; }
    .loading-card { background: white; border-radius: 20px; padding: 30px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .loading-spinner { width: 48px; height: 48px; border: 5px solid #E2E8F0; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; font-weight: 700; color: var(--dol-black); }
    .loading-sub { font-size: 11px; color: #718096; margin-top: 4px; }
    .skill-btns { display: flex; gap: 5px; }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="dol-header-title">MARKING <span class="red-text">ENTRANCE KIDS</span></div>

    <!-- THÔNG TIN CƠ BẢN -->
    <div class="dol-card-main">
      <div class="dol-input-group"><label>Giáo viên</label><input type="text" id="gvName" placeholder="Tên giáo viên..."></div>
      <div class="dol-input-group"><label>Học viên</label><input type="text" id="hvName" placeholder="Tên học viên..."></div>
      <div style="display:flex; gap:8px; align-items:flex-end;">
        <div class="dol-input-group" style="flex:1;">
          <label>Bài test</label>
          <select id="level" onchange="updateTestNumberDropdown(); window.updateTotalDisplay()">
            <option value="Starters">Starters</option>
            <option value="Movers">Movers</option>
            <option value="Flyers">Flyers</option>
          </select>
        </div>
        <div class="dol-input-group" style="flex:1;">
          <label>Số test</label>
          <select id="testNumber" onchange="window.updateTotalDisplay()">
            <option value="1">Test 1</option>
          </select>
          <div id="ans-key-status" style="font-size:9px;color:#718096;margin-top:2px;font-weight:600;"></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
          <label class="btn-sheets-pro">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6C4.89 2 4 2.9 4 4V20C4 21.1 4.89 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" fill="#0F9D58"/><path d="M14 2V8H20L14 2Z" fill="#B7E1CD"/><path d="M16 13H8V15H16V13ZM16 17H8V19H16V17ZM13 9H8V11H13V9Z" fill="white"/></svg>
            Up Report <input type="file" id="excelTemplate" accept=".xlsx" hidden>
          </label>
          <div id="status-template" style="font-size:9px; color:#A0AEC0; margin-top:3px; font-weight:600;">chưa tải file!</div>
        </div>
      </div>
    </div>

    <!-- ===== GOOGLE DRIVE PANEL ===== -->
    <div class="drive-panel">
      <div class="drive-panel-title">
        <svg width="14" height="14" viewBox="0 0 87.3 78" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.5C.4 49.9 0 51.45 0 53h27.5z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.65z" fill="#ea4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.1.45-4.5 1.2z" fill="#00832d"/><path d="M59.8 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.1-.45 4.5-1.2z" fill="#2684fc"/><path d="M73.4 26.5l-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.8 53h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
        Nạp bài từ Google Drive
      </div>

      <!-- Chưa đăng nhập -->
      <div id="drive-not-logged">
        <button class="btn-google-login" onclick="loginGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Đăng nhập tài khoản DOL
        </button>
      </div>

      <!-- Đã đăng nhập -->
      <div id="drive-logged" style="display:none; flex-direction:column; gap:8px;">
        <div class="drive-status-bar">
          <div class="drive-avatar" id="drive-avatar-text">T</div>
          <div class="drive-user-name" id="drive-user-name">Đang tải...</div>
          <button class="btn-google-logout" onclick="logoutGoogle()">Đăng xuất</button>
        </div>

        <!-- Link RW -->
        <div>
          <div style="font-size:9px; font-weight:700; color:#718096; margin-bottom:3px;">LINK FOLDER READING & WRITING</div>
          <div class="drive-link-row">
            <input class="drive-link-input" id="rw-drive-link" placeholder="Paste link folder Drive RW...">
            <button class="btn-load-drive" id="btn-load-rw" onclick="loadFromDrive('RW')">Tải RW</button>
          </div>
          <div class="drive-progress" id="rw-drive-progress"></div>
        </div>

        <!-- Link LI -->
        <div>
          <div style="font-size:9px; font-weight:700; color:#718096; margin-bottom:3px;">LINK FOLDER LISTENING</div>
          <div class="drive-link-row">
            <input class="drive-link-input" id="li-drive-link" placeholder="Paste link folder Drive Listening...">
            <button class="btn-load-drive" id="btn-load-li" onclick="loadFromDrive('LI')">Tải LI</button>
          </div>
          <div class="drive-progress" id="li-drive-progress"></div>
        </div>
      </div>
    </div>

    <!-- SKILL CARDS -->
    <div class="skill-card rw-blue">
      <div class="skill-head">
        <span class="skill-name" style="display:flex;align-items:center;gap:5px;">📘 R & W</span>
        <div class="skill-btns">
          <button class="btn-dol-action blue-main" onclick="switchSkillView('RW')" id="btn-view-rw">📋 Preview</button>
          <button class="btn-dol-action danger-light" onclick="window.resetSkill('RW')">Chấm lại</button>
          <label class="btn-dol-action blue-main">📂 Local <input type="file" id="rwFolder" webkitdirectory directory multiple hidden></label>
        </div>
      </div>
      <div id="rw-list" class="page-grid-modern"></div>
    </div>

    <div class="skill-card li-green">
      <div class="skill-head">
        <span class="skill-name" style="display:flex;align-items:center;gap:5px;">🎧 LISTENING</span>
        <div class="skill-btns">
          <button class="btn-dol-action green-main" onclick="switchSkillView('LI')" id="btn-view-li">📋 Preview</button>
          <button class="btn-dol-action danger-light" onclick="window.resetSkill('LI')">Chấm lại</button>
          <label class="btn-dol-action green-main">📂 Local <input type="file" id="liFolder" webkitdirectory directory multiple hidden></label>
        </div>
      </div>
      <div id="li-list" class="page-grid-modern"></div>
    </div>

    <div class="skill-card sp-yellow">
      <div class="skill-head">
        <span class="skill-name">🗣️ SPEAKING</span>
        <input type="number" id="sp-score" style="width:55px; height:30px; text-align:center; font-weight:800; border-radius:8px; border:1.5px solid #CBD5E0;" value="0" min="0" max="15" onchange="window.updateTotalDisplay()">
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-container">
      <div class="sum-box">
        <div class="sum-label color-rw">RW: <span id="rw-sum-display">0/25 (0🛡️)</span></div>
        <textarea id="rw-cmt" placeholder="Nhận xét R&W..."></textarea>
      </div>
      <div class="sum-box">
        <div class="sum-label color-li">Li: <span id="li-sum-display">0/25 (0🛡️)</span></div>
        <textarea id="li-cmt" placeholder="Nhận xét Listening..."></textarea>
      </div>
      <div class="sum-box">
        <div class="sum-label color-sp">S: <span id="sp-sum-display">0/15 (0🛡️)</span></div>
        <textarea id="sp-cmt" placeholder="Nhận xét Speaking..."></textarea>
      </div>
      <div class="dol-final-hero">
        <div class="shield-circle-hero"><span id="shield-preview">0/15</span><small>khiên</small></div>
        <select id="targetClass" class="select-hero">
          <option value="Starters">Starters</option>
          <option value="Movers">Movers</option>
          <option value="Flyers">Flyers</option>
          <option value="Foundation">Foundation</option>
        </select>
      </div>
      <button class="btn-dol-primary-red" onclick="window.exportExcel()">XUẤT REPORT EXCEL</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <section id="content-main">
    <div id="answer-key-section">
      <h4>🔑 Answer Key</h4>
      <img id="answer-key-img" src="ans_starters_test1.png" alt="Cần file ans_starters_test1.png">
    </div>
    <div id="resize-handle"></div>
    <main id="viewer-container"><div id="canvas-list"></div></main>
  </section>
</div>

<!-- CONTEXT MENU -->
<div id="mark-menu" class="context-menu-pro">
  <button onclick="window.switchMark()">Đổi ✅/❌</button>
  <button onclick="window.deleteMark()" style="color:var(--dol-red)">Xóa dấu</button>
</div>

<!-- LOADING OVERLAY -->
<div id="drive-loading">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Đang tải từ Drive...</div>
    <div class="loading-sub" id="loading-sub">Vui lòng chờ</div>
  </div>
</div>

<script>
// ============================================================
// CONFIG GOOGLE
// ============================================================
const GOOGLE_CLIENT_ID = '311524649262-mnm0i94ni311s5ustg3sgs8o9bcb1v34.apps.googleusercontent.com';
const GOOGLE_API_KEY   = 'AIzaSyBT3hQPdHOryBgRZKKIlkdH3HtWLaAvzZs';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
const ANS_FOLDER_ID    = '1uCG0zGp8m3dGprxvB3VqAySz_ClOtfYC';

// ============================================================
// STATE
// ============================================================
var canvases = {};
var pageScores = { RW: {}, LI: {} };
var currentType = '';
var selectedObject = null;
var activeCanvasName = '';
var loadedFiles = { RW: [], LI: [] };
var gapiReady = false;
var tokenClient = null;
var accessToken = null;
// ansKeyIndex: { starters: { 1: 'fileId', 2: 'fileId' }, movers: {...}, flyers: {...} }
var ansKeyIndex = { starters: {}, movers: {}, flyers: {} };

// ============================================================
// GOOGLE AUTH
// ============================================================
function waitForGapi(cb) {
  if (typeof gapi !== 'undefined') { cb(); return; }
  setTimeout(() => waitForGapi(cb), 200);
}

function waitForGis(cb) {
  if (typeof google !== 'undefined' && google.accounts) { cb(); return; }
  setTimeout(() => waitForGis(cb), 200);
}

window.onload = function () {
  // Listeners cũ
  document.getElementById('rwFolder').onchange = (e) => loadAllImages(e, 'RW');
  document.getElementById('liFolder').onchange = (e) => loadAllImages(e, 'LI');
  document.getElementById('excelTemplate').onchange = (e) => {
    document.getElementById('status-template').innerText = e.target.files[0] ? 'đã up file!' : 'chưa tải file!';
    document.getElementById('status-template').style.color = '#0F9D58';
  };
  document.getElementById('viewer-container').addEventListener('scroll', function () {
    const wrappers = document.querySelectorAll('.canvas-item-wrapper');
    wrappers.forEach(w => {
      const rect = w.getBoundingClientRect();
      if (rect.top >= 0 && rect.top < window.innerHeight / 2) highlightPageBox(w.dataset.filename);
    });
  });

  // Khởi tạo GAPI + GIS
  waitForGapi(() => {
    gapi.load('client', async () => {
      await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
      gapiReady = true;
      fetchAnswerKeyIndex(); // Tải kho đề tự động
    });
  });

  waitForGis(() => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: SCOPES,
      callback: (response) => {
        if (response.error) { alert('Đăng nhập thất bại: ' + response.error); return; }
        accessToken = response.access_token;
        gapi.client.setToken({ access_token: accessToken });
        showLoggedInState();
      }
    });
  });

  // Kiểm tra token đã lưu
  const saved = sessionStorage.getItem('dol_drive_token');
  if (saved) {
    accessToken = saved;
    waitForGapi(() => {
      gapi.load('client', async () => {
        await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
        gapiReady = true;
        gapi.client.setToken({ access_token: accessToken });
        const savedName = sessionStorage.getItem('dol_drive_user') || '';
        showLoggedInState(savedName);
      });
    });
  }

  // Resize handle
  const resizeHandle = document.getElementById('resize-handle');
  const resizePanel  = document.getElementById('answer-key-section');
  let isResizing = false;
  resizeHandle.addEventListener('mousedown', () => { isResizing = true; document.body.style.userSelect = 'none'; document.body.style.cursor = 'ns-resize'; });
  document.addEventListener('mousemove', (e) => { if (!isResizing) return; const h = e.clientY; if (h > 80 && h < window.innerHeight * 0.85) resizePanel.style.height = h + 'px'; });
  document.addEventListener('mouseup', () => { isResizing = false; document.body.style.userSelect = 'auto'; document.body.style.cursor = 'default'; });
};

function loginGoogle() {
  if (!tokenClient) { alert('Google API chưa sẵn sàng, thử lại sau 2 giây.'); return; }
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function showLoggedInState(name) {
  if (!name) {
    // Dùng XMLHttpRequest thay fetch để tránh CORS trên GitHub Pages
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://www.googleapis.com/oauth2/v3/userinfo');
    xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
    xhr.onload = () => {
      const info = JSON.parse(xhr.responseText);
      const displayName = info.name || info.email || 'DOL User';
      sessionStorage.setItem('dol_drive_user', displayName);
      sessionStorage.setItem('dol_drive_token', accessToken);
      document.getElementById('drive-avatar-text').innerText = displayName[0].toUpperCase();
      document.getElementById('drive-user-name').innerText = displayName;
    };
    xhr.send();
  } else {
    document.getElementById('drive-avatar-text').innerText = name[0].toUpperCase();
    document.getElementById('drive-user-name').innerText = name;
  }
  document.getElementById('drive-not-logged').style.display = 'none';
  document.getElementById('drive-logged').style.display = 'flex';
}

function logoutGoogle() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  sessionStorage.removeItem('dol_drive_token');
  sessionStorage.removeItem('dol_drive_user');
  gapi.client.setToken(null);
  document.getElementById('drive-not-logged').style.display = 'block';
  document.getElementById('drive-logged').style.display = 'none';
}

// ============================================================
// LOAD TỪ DRIVE
// ============================================================
function extractFolderId(link) {
  // Hỗ trợ nhiều dạng link Drive
  const patterns = [
    /\/folders\/([a-zA-Z0-9_-]+)/,
    /id=([a-zA-Z0-9_-]+)/,
    /^([a-zA-Z0-9_-]{25,})$/
  ];
  for (const p of patterns) {
    const m = link.trim().match(p);
    if (m) return m[1];
  }
  return null;
}

async function loadFromDrive(type) {
  if (!accessToken) { alert('Vui lòng đăng nhập Google trước!'); return; }
  if (!gapiReady)   { alert('Google API chưa sẵn sàng, thử lại sau 2 giây.'); return; }

  const linkInput = document.getElementById(type === 'RW' ? 'rw-drive-link' : 'li-drive-link');
  const progressEl = document.getElementById(type === 'RW' ? 'rw-drive-progress' : 'li-drive-progress');
  const btn = document.getElementById(type === 'RW' ? 'btn-load-rw' : 'btn-load-li');

  const folderId = extractFolderId(linkInput.value);
  if (!folderId) { alert('Link Drive không hợp lệ. Vui lòng paste đúng link folder.'); return; }

  btn.disabled = true;
  showLoading('Đang đọc danh sách file...', 'Kết nối Google Drive');

  try {
    // Lấy danh sách file ảnh trong folder (bỏ qua mp4, mov, avi, mkv)
    let allFiles = [];
    let pageToken = null;
    do {
      const params = {
        q: `'${folderId}' in parents and trashed = false and (mimeType contains 'image/')`,
        fields: 'nextPageToken, files(id, name, mimeType)',
        orderBy: 'name',
        pageSize: 100,
        includeItemsFromAllDrives: true,
        supportsAllDrives: true,
        corpora: 'allDrives',
      };
      if (pageToken) params.pageToken = pageToken;
      const res = await gapi.client.drive.files.list(params);
      allFiles = allFiles.concat(res.result.files || []);
      pageToken = res.result.nextPageToken;
    } while (pageToken);

    // Sort tên tự nhiên (P1, P2, P10...)
    allFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    if (allFiles.length === 0) {
      hideLoading();
      progressEl.innerText = '⚠️ Không tìm thấy ảnh trong folder này.';
      btn.disabled = false;
      return;
    }

    updateLoading(`Tìm thấy ${allFiles.length} file ảnh`, 'Đang tải về...');

    // Tải từng file bằng XMLHttpRequest (tránh CORS trên GitHub Pages)
    const fileObjects = [];
    for (let i = 0; i < allFiles.length; i++) {
      const f = allFiles[i];
      updateLoading(`Đang tải ảnh ${i + 1}/${allFiles.length}`, f.name);

      const blob = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`);
        xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
        xhr.responseType = 'blob';
        xhr.onload = () => {
          if (xhr.status === 200) resolve(xhr.response);
          else reject(new Error(`Lỗi tải file: ${f.name} (${xhr.status})`));
        };
        xhr.onerror = () => reject(new Error(`Network error khi tải: ${f.name}`));
        xhr.send();
      });

      const fileObj = new File([blob], f.name, { type: blob.type || 'image/jpeg' });
      fileObjects.push(fileObj);
      progressEl.innerText = `✅ Đã tải ${i + 1}/${allFiles.length}`;
    }

    hideLoading();
    progressEl.innerText = `✅ Loaded ${fileObjects.length} ảnh`;

    // Đưa vào render như file local
    loadedFiles[type] = fileObjects;
    await renderSkillUI(type);

  } catch (err) {
    hideLoading();
    console.error(err);
    if (err.status === 401 || (err.result && err.result.error && err.result.error.code === 401)) {
      alert('Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại.');
      logoutGoogle();
    } else {
      alert('Lỗi: ' + (err.message || JSON.stringify(err)));
    }
    progressEl.innerText = '❌ Tải thất bại';
  }

  btn.disabled = false;
}

function showLoading(text, sub) {
  document.getElementById('loading-text').innerText = text;
  document.getElementById('loading-sub').innerText = sub;
  document.getElementById('drive-loading').classList.add('show');
}
function updateLoading(text, sub) {
  document.getElementById('loading-text').innerText = text;
  document.getElementById('loading-sub').innerText = sub;
}
function hideLoading() {
  document.getElementById('drive-loading').classList.remove('show');
}

// ============================================================
// ANSWER KEY INDEX — fetch từ Kho đề SMF (public folder, dùng API key)
// ============================================================
async function fetchAnswerKeyIndex() {
  const statusEl = document.getElementById('ans-key-status');
  if (statusEl) statusEl.innerText = '⏳ Đang tải danh sách đề...';
  try {
    const url = `https://www.googleapis.com/drive/v3/files?q='${ANS_FOLDER_ID}'+in+parents+and+trashed=false&fields=files(id,name)&orderBy=name&key=${GOOGLE_API_KEY}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.files) throw new Error('Không lấy được danh sách file');

    // Reset index
    ansKeyIndex = { starters: {}, movers: {}, flyers: {} };

    // Parse tên file: ans_starters_test1.png / ans_movers_test3.jpg
    const pattern = /^ans_(starters|movers|flyers)_test(\d+)\.(png|jpg|jpeg)$/i;
    data.files.forEach(f => {
      const m = f.name.match(pattern);
      if (m) {
        const level = m[1].toLowerCase();
        const num   = parseInt(m[2]);
        ansKeyIndex[level][num] = f.id;
      }
    });

    // Cập nhật dropdown Số test theo level hiện tại
    updateTestNumberDropdown();
    if (statusEl) statusEl.innerText = '';
  } catch (e) {
    console.warn('fetchAnswerKeyIndex error:', e);
    if (statusEl) statusEl.innerText = '⚠️ Không tải được kho đề';
  }
}

function updateTestNumberDropdown() {
  const level = document.getElementById('level').value.toLowerCase();
  const sel   = document.getElementById('testNumber');
  const currentVal = sel.value;
  const tests = Object.keys(ansKeyIndex[level] || {}).map(Number).sort((a,b) => a-b);

  sel.innerHTML = '';
  if (tests.length === 0) {
    // Fallback: giữ ít nhất Test 1
    sel.innerHTML = '<option value="1">Test 1</option>';
  } else {
    tests.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.innerText = 'Test ' + n;
      sel.appendChild(opt);
    });
    // Giữ lại giá trị cũ nếu còn tồn tại
    if (tests.includes(parseInt(currentVal))) sel.value = currentVal;
  }
  updateAnswerKey(document.getElementById('level').value);
}

// ============================================================
// ANSWER KEY — hiển thị ảnh từ Drive
// ============================================================
function updateAnswerKey(level) {
  const img   = document.getElementById('answer-key-img');
  const lv    = level.toLowerCase();
  const testNum = parseInt(document.getElementById('testNumber').value);
  const fileId  = (ansKeyIndex[lv] || {})[testNum];

  if (fileId) {
    // Dùng thumbnail URL công khai, không cần auth
    img.src = `https://drive.google.com/thumbnail?id=${fileId}&sz=w1600`;
    img.alt = '';
    img.onerror = () => {
      // Fallback sang uc export nếu thumbnail fail
      img.src = `https://drive.google.com/uc?export=view&id=${fileId}`;
      img.onerror = () => { img.alt = `Không tải được ans_${lv}_test${testNum}`; img.src = ''; };
    };
  } else {
    img.src = '';
    img.alt = `Chưa có ans_${lv}_test${testNum} trong kho đề`;
  }
}

async function loadAllImages(e, type) {
  const files = Array.from(e.target.files)
    .filter(f => f.type.startsWith('image/'))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  if (files.length === 0) return;
  loadedFiles[type] = files;
  renderSkillUI(type);
}

// Per-skill canvas containers stored in memory
var skillContainers = { RW: null, LI: null };
var activeViewType = '';

function switchSkillView(type) {
  if (activeViewType === type) return;
  activeViewType = type;
  const container = document.getElementById('canvas-list');
  container.innerHTML = '';
  if (skillContainers[type]) {
    container.appendChild(skillContainers[type]);
  }
  // Re-highlight correct page box for the switched skill
  if (loadedFiles[type] && loadedFiles[type].length > 0) {
    highlightPageBox(loadedFiles[type][0].name);
  }
}

async function renderSkillUI(type) {
  const files = loadedFiles[type];
  const list = document.getElementById(type === 'RW' ? 'rw-list' : 'li-list');
  list.innerHTML = '';
  pageScores[type] = {};

  // Destroy old fabric canvases for this skill only
  if (skillContainers[type]) {
    const oldNames = Object.keys(canvases).filter(name =>
      loadedFiles[type] && loadedFiles[type].some(f => f.name === name)
    );
    oldNames.forEach(name => {
      try { canvases[name].dispose(); } catch(e) {}
      delete canvases[name];
    });
  }

  // Create new DOM container for this skill
  const fragment = document.createElement('div');
  fragment.id = 'skill-container-' + type;
  skillContainers[type] = fragment;

  // Switch view to this skill
  activeViewType = type;
  currentType = type;
  const container = document.getElementById('canvas-list');
  container.innerHTML = '';
  container.appendChild(fragment);

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    pageScores[type][file.name] = 0;
    const safeName = file.name.replace(/\W/g, '_');
    const box = document.createElement('div');
    box.className = 'page-box'; box.id = 'box-' + safeName;
    box.innerHTML = '<span>P' + (i + 1) + '</span><input type="number" value="0">';
    box.onclick = () => { const el = document.getElementById('view-' + safeName); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); };
    const inp = box.querySelector('input');
    inp.onchange = (ev) => { pageScores[type][file.name] = parseInt(ev.target.value) || 0; window.updateTotalDisplay(); };
    inp.onclick = (ev) => ev.stopPropagation();
    list.appendChild(box);

    const wrapper = document.createElement('div');
    wrapper.className = 'canvas-item-wrapper';
    wrapper.id = 'view-' + safeName;
    wrapper.dataset.filename = file.name;
    wrapper.innerHTML = '<div style="position:absolute;top:-12px;left:10px;background:var(--dol-red);color:white;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700;z-index:10">P' + (i + 1) + '</div><canvas id="canv-' + type + '-' + i + '"></canvas>';
    fragment.appendChild(wrapper);
    await initCanvas(file, 'canv-' + type + '-' + i, file.name);
  }
  if (files.length > 0) highlightPageBox(files[0].name);
}

async function convertToJpegIfNeeded(file) {
  const name = file.name.toLowerCase();
  const isHeic = name.endsWith('.heic') || name.endsWith('.heif') ||
                 file.type === 'image/heic' || file.type === 'image/heif';
  if (!isHeic) return file;
  try {
    const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 });
    const outBlob = Array.isArray(converted) ? converted[0] : converted;
    return new File([outBlob], file.name.replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg' });
  } catch(e) {
    console.warn('HEIC convert failed for', file.name, e);
    return file; // fallback, will likely still fail to display
  }
}

function initCanvas(file, canvasId, fileName) {
  return new Promise(async (resolve) => {
    const safeFile = await convertToJpegIfNeeded(file);
    const reader = new FileReader();
    reader.onload = (f) => {
      fabric.Image.fromURL(f.target.result, img => {
        const c = new fabric.Canvas(canvasId, { selection: false });
        const scale = (window.innerHeight - 100) / img.height;
        c.setDimensions({ width: img.width * scale, height: img.height * scale });
        c.setBackgroundImage(img, c.renderAll.bind(c), { scaleX: scale, scaleY: scale });
        c.on('mouse:down', (opt) => {
          activeCanvasName = fileName; highlightPageBox(fileName);
          if (opt.target) {
            selectedObject = opt.target;
            document.getElementById('mark-menu').style.display = 'flex';
            document.getElementById('mark-menu').style.left = (opt.e.pageX + 10) + 'px';
            document.getElementById('mark-menu').style.top  = (opt.e.pageY + 10) + 'px';
          } else {
            document.getElementById('mark-menu').style.display = 'none';
            const ptr = c.getPointer(opt.e);
            c.add(new fabric.Text('✅', { left: ptr.x - 12, top: ptr.y - 12, fontSize: 28, selectable: true, hasControls: false }));
            updateScoreFromMark(fileName, 1); c.requestRenderAll();
          }
        });
        canvases[fileName] = c; resolve();
      });
    };
    reader.readAsDataURL(safeFile);
  });
}

function highlightPageBox(name) {
  activeCanvasName = name;
  document.querySelectorAll('.page-box').forEach(b => b.classList.remove('active'));
  const target = document.getElementById(`box-${name.replace(/\W/g, '_')}`);
  if (target) target.classList.add('active');
}

function updateScoreFromMark(name, val) {
  const box = document.getElementById(`box-${name.replace(/\W/g, '_')}`);
  if (box) { const inp = box.querySelector('input'); inp.value = Math.max(0, parseInt(inp.value) + val); pageScores[currentType][name] = parseInt(inp.value); window.updateTotalDisplay(); }
}

function getShields(score, level, type) {
  if (type === 'SP') { if (score >= 13) return 5; if (score >= 10) return 4; if (score >= 7) return 3; if (score >= 4) return 2; return score >= 1 ? 1 : 0; }
  if (level === 'Starters') { if (type === 'RW') return score >= 21 ? 5 : score >= 19 ? 4 : score >= 16 ? 3 : score >= 13 ? 2 : (score >= 1 ? 1 : 0); else return score >= 18 ? 5 : score >= 16 ? 4 : score >= 13 ? 3 : score >= 11 ? 2 : (score >= 1 ? 1 : 0); }
  if (level === 'Movers')   { if (type === 'RW') return score >= 33 ? 5 : score >= 29 ? 4 : score >= 24 ? 3 : score >= 18 ? 2 : (score >= 1 ? 1 : 0); else return score >= 21 ? 5 : score >= 18 ? 4 : score >= 14 ? 3 : score >= 11 ? 2 : (score >= 1 ? 1 : 0); }
  if (level === 'Flyers')   { if (type === 'RW') return score >= 42 ? 5 : score >= 36 ? 4 : score >= 30 ? 3 : score >= 24 ? 2 : (score >= 1 ? 1 : 0); else return score >= 23 ? 5 : score >= 20 ? 4 : score >= 17 ? 3 : score >= 14 ? 2 : (score >= 1 ? 1 : 0); }
  return 0;
}

function suggestClass(level, totalS) {
  if (totalS >= 1 && totalS <= 5) { if (level === 'Flyers') return 'Movers'; if (level === 'Movers') return 'Starters'; return 'Starters'; }
  if (totalS >= 12) { if (level === 'Starters') return 'Movers'; if (level === 'Movers') return 'Flyers'; if (level === 'Flyers') return 'Foundation'; }
  return level;
}

window.updateTotalDisplay = function () {
  const lv = document.getElementById('level').value;
  const rw = Object.values(pageScores.RW).reduce((a, b) => a + b, 0);
  const li = Object.values(pageScores.LI).reduce((a, b) => a + b, 0);
  const sp = parseInt(document.getElementById('sp-score').value) || 0;
  const sRW = getShields(rw, lv, 'RW'), sLI = getShields(li, lv, 'LI'), sSP = getShields(sp, lv, 'SP');
  let rwMax = lv === 'Starters' ? 25 : (lv === 'Movers' ? 39 : 48);
  let liMax = lv === 'Starters' ? 20 : 25;
  document.getElementById('rw-sum-display').innerHTML = `<b class="score-achieved">${rw}</b>/${rwMax} (${sRW}🛡️)`;
  document.getElementById('li-sum-display').innerHTML = `<b class="score-achieved">${li}</b>/${liMax} (${sLI}🛡️)`;
  document.getElementById('sp-sum-display').innerHTML = `<b class="score-achieved">${sp}</b>/15 (${sSP}🛡️)`;
  const totalS = sRW + sLI + sSP;
  document.getElementById('shield-preview').innerText = totalS + '/15';
  document.getElementById('targetClass').value = suggestClass(lv, totalS);
  updateAnswerKey(lv);
};

window.resetSkill = function (type) {
  if (!confirm('Chấm lại ' + type + '? Điểm và dấu tick sẽ bị xóa.')) return;
  for (let f in pageScores[type]) { pageScores[type][f] = 0; }
  Object.keys(canvases).forEach(name => {
    if (loadedFiles[type] && loadedFiles[type].some(file => file.name === name)) {
      const c = canvases[name]; c.getObjects('text').forEach(obj => c.remove(obj)); c.requestRenderAll();
    }
  });
  const listId = type === 'RW' ? 'rw-list' : 'li-list';
  document.querySelectorAll('#' + listId + ' input').forEach(inp => inp.value = 0);
  window.updateTotalDisplay();
};

window.switchMark = function () {
  const c = canvases[activeCanvasName];
  const nextMark = selectedObject.text === '✅' ? '❌' : '✅';
  selectedObject.set('text', nextMark); selectedObject.setCoords(); c.requestRenderAll();
  updateScoreFromMark(activeCanvasName, nextMark === '❌' ? -1 : 1);
  document.getElementById('mark-menu').style.display = 'none';
};

window.deleteMark = function () {
  const c = canvases[activeCanvasName];
  if (selectedObject.text === '✅') updateScoreFromMark(activeCanvasName, -1);
  c.remove(selectedObject); c.requestRenderAll();
  document.getElementById('mark-menu').style.display = 'none';
};

window.exportExcel = async function () {
  const fileInput = document.getElementById('excelTemplate');
  if (!fileInput.files[0]) return alert('Nạp phôi!');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const workbook = new ExcelJS.Workbook(); await workbook.xlsx.load(e.target.result);
    const worksheet = workbook.getWorksheet(1); const currentLevel = document.getElementById('level').value;
    const rw = Object.values(pageScores.RW).reduce((a, b) => a + b, 0);
    const li = Object.values(pageScores.LI).reduce((a, b) => a + b, 0);
    const sp = parseInt(document.getElementById('sp-score').value) || 0;
    const sRW = getShields(rw, currentLevel, 'RW'), sLI = getShields(li, currentLevel, 'LI'), sSP = getShields(sp, currentLevel, 'SP');
    const data = {
      '{hvName}': document.getElementById('hvName').value, '{gvName}': document.getElementById('gvName').value,
      '{level}': currentLevel, '{date}': new Date().toLocaleDateString('vi-VN'),
      '{rwScore}': rw, '{liScore}': li, '{spScore}': sp,
      '{rwShields}': sRW, '{liShields}': sLI, '{spShields}': sSP,
      '{totalShields}': (sRW + sLI + sSP) + '/15',
      '{rwCmt}': document.getElementById('rw-cmt').value, '{liCmt}': document.getElementById('li-cmt').value,
      '{spCmt}': document.getElementById('sp-cmt').value, '{class}': document.getElementById('targetClass').value,
      '{placement}': document.getElementById('targetClass').value
    };
    worksheet.eachRow(row => { row.eachCell(cell => { if (cell.value && typeof cell.value === 'string') { for (let tag in data) { if (cell.value.includes(tag)) cell.value = cell.value.split(tag).join(data[tag]); } } }); });
    const buffer = await workbook.xlsx.writeBuffer();
    saveAs(new Blob([buffer]), `Report_${data['{hvName}'] || 'Student'}.xlsx`);
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
